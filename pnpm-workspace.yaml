packages:
  - "packages/agentic"
  - "packages/api"
  - "packages/types"
  - "packages/frontend"
  - "packages/graph"
  - "packages/cli"
  - "packages/widget"

nodeLinker: hoisted
autoInstallPeers: true
strictPeerDependencies: false
ignoreWorkspaceRootCheck: true

allowBuilds:
  "@compodoc/compodoc": true
  "@nestjs/core": true
  "@parcel/watcher": true
  "@scarf/scarf": true
  "@swc/core": true
  better-sqlite3: true
  esbuild: true
  protobufjs: true
  tree-sitter: true
  unrs-resolver: true

overrides:
  "@babel/core": "7.29.7"
  "@opentelemetry/core": "2.8.0"
  "@types/node": "^22.7.4"
  "ajv@8": "8.20.0"
  "brace-expansion": ">=5.0.7"
  "dompurify": "3.4.12"
  "engine.io": "6.6.9"
  "glob": "13.0.6"
  "immutable": ">=5.1.8"
  "ip-address": "10.1.1"
  "js-yaml": "4.3.0"
  "jsonata": "^2.2.0"
  "lodash": "4.18.1"
  "lodash-es": "4.18.1"
  "minimatch": "10.2.5"
  "nestjs-auditlog>@opentelemetry/auto-instrumentations-node": "0.75.0"
  "nestjs-auditlog>@opentelemetry/sdk-node": "0.217.0"
  "openai>zod": "^3.23.8"
  "picomatch": "4.0.4"
  "protobufjs": "7.6.3"
  "shell-quote": ">=1.8.5"
  "svgo@>=4.0.0 <4.0.2": ">=4.0.2"
  "uuid": "11.1.1"
  "ws": "8.21.0"
  "multer": "2.2.0"
  "undici": "7.28.0"
