name: Main CI
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  quality-checks:
    name: Run typecheck/lint/test/build for all packages
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_DB: hexabot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hexabot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: 🔎 Checkout repository
        uses: actions/checkout@v4

      - name: ⏳ Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          standalone: true
          run_install: false

      - name: ⏳ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔎 Verify API SQLite driver
        run: pnpm --filter @hexabot-ai/api exec node -e "require('better-sqlite3'); require('typeorm/platform/PlatformTools').PlatformTools.load('better-sqlite3')"

      - name: 🧪 Typecheck (all packages via Turbo)
        run: pnpm typecheck

      - name: 🧹 Lint (all packages via Turbo)
        run: pnpm lint

      - name: 🔬 Unit tests (all packages via Turbo)
        run: pnpm test

      - name: 🐘 PostgreSQL/pgvector RAG integration tests
        run: pnpm --filter @hexabot-ai/api exec jest --runInBand --runTestsByPath src/extensions/helpers/pgvector/pgvector.integration.spec.ts
        env:
          DB_TYPE: postgres
          TEST_PGVECTOR_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/hexabot_test

      - name: 🛠️ Build (all packages via Turbo)
        run: pnpm build
