name: "V2: Build and Push Docker Base Image"

on:
  push:
    tags:
      - 'v2.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate V2 release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != refs/tags/v2.* ]]; then
            echo "This workflow only publishes from v2.* tags. Current ref: $GITHUB_REF"
            exit 1
          fi

          if [[ ! "$GITHUB_REF_NAME" =~ ^v2\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported v2 tag '$GITHUB_REF_NAME'. Expected format v2.X.Y."
            exit 1
          fi

          git fetch --no-tags origin +refs/heads/v2-dev:refs/remotes/origin/v2-dev

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/v2-dev; then
            echo "Tag $GITHUB_REF_NAME ($GITHUB_SHA) is not reachable from origin/v2-dev."
            exit 1
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: hexastack/hexabot-base
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        id: docker_login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Base Docker base image
        uses: docker/build-push-action@v6
        with:
          context: ./api/
          file: ./api/Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
